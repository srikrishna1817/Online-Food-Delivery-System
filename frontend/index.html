<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuickBite — Online Food Delivery</title>
  <meta name="description" content="Order your favourite food online with QuickBite. Fast delivery, great restaurants, happy customers." />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    /* ── Index-page-only extra styles ───────────────────────────────────────── */
    .auth-bg {
      position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 0;
    }
    .auth-bg .blob {
      position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.18;
    }
    .blob-1 { width: 500px; height: 500px; background: var(--accent); top: -100px; left: -100px; animation: float1 12s ease-in-out infinite; }
    .blob-2 { width: 400px; height: 400px; background: #3b82f6; bottom: -80px; right: -80px; animation: float2 15s ease-in-out infinite; }
    .blob-3 { width: 300px; height: 300px; background: var(--purple); top: 40%; left: 50%; animation: float3 10s ease-in-out infinite; }
    @keyframes float1 { 0%, 100% { transform: translate(0,0) scale(1); } 50% { transform: translate(40px, 30px) scale(1.05); } }
    @keyframes float2 { 0%, 100% { transform: translate(0,0) scale(1); } 50% { transform: translate(-30px, -20px) scale(1.08); } }
    @keyframes float3 { 0%, 100% { transform: translate(-50%, 0) scale(1); } 50% { transform: translate(-50%, 20px) scale(0.95); } }

    .auth-page { position: relative; z-index: 1; }
    .auth-card { animation: slideUp 0.5s cubic-bezier(0.4,0,0.2,1); }
    @keyframes slideUp { from { transform: translateY(24px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    .error-msg {
      background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3);
      border-radius: 8px; padding: 0.65rem 1rem;
      font-size: 0.85rem; color: #f87171; margin-bottom: 1rem;
    }
    .success-msg {
      background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3);
      border-radius: 8px; padding: 0.65rem 1rem;
      font-size: 0.85rem; color: #4ade80; margin-bottom: 1rem;
    }
    /* Password eye toggle */
    .pw-wrapper { position: relative; }
    .pw-wrapper .form-control { padding-right: 2.8rem; width: 100%; box-sizing: border-box; }
    .pw-eye {
      position: absolute; right: 0.75rem; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: var(--text-muted); font-size: 1.1rem; padding: 0; line-height: 1;
    }
    .pw-eye:hover { color: var(--text); }
  </style>
</head>
<body>

  <!-- Animated background blobs -->
  <div class="auth-bg">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <!-- ── Main Auth Card ───────────────────────────────────────────────────── -->
  <div class="auth-page">
    <div class="auth-card">

      <!-- Logo -->
      <div class="auth-logo">
        <div class="logo-icon">🍕</div>
        <h1><span>QuickBite</span></h1>
        <p>Your favourite food, delivered fast</p>
      </div>

      <!-- Tab switcher -->
      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login"    onclick="showTab('login')">Sign In</button>
        <button class="auth-tab"        id="tab-register" onclick="showTab('register')">Register</button>
      </div>

      <!-- Status message area -->
      <div id="msg-area"></div>

      <!-- ──── LOGIN FORM ──── -->
      <form id="form-login" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="form-label" for="login-email">Email Address</label>
          <input class="form-control" id="login-email" type="email"
                 placeholder="you@example.com" required autocomplete="email" />
        </div>
        <div class="form-group">
          <label class="form-label" for="login-password">Password</label>
          <div class="pw-wrapper">
            <input class="form-control" id="login-password" type="password"
                   placeholder="••••••••" required autocomplete="current-password" />
            <button type="button" class="pw-eye" onclick="togglePw('login-password', this)" title="Show/hide password">👁️</button>
          </div>
        </div>
        <button class="btn btn-primary btn-full btn-lg" type="submit" id="login-btn">
          Sign In
        </button>
      </form>

      <!-- ──── REGISTER FORM ──── -->
      <form id="form-register" class="hidden" onsubmit="handleRegister(event)">
        <div class="form-group">
          <label class="form-label" for="reg-name">Full Name</label>
          <input class="form-control" id="reg-name" type="text"
                 placeholder="Your full name" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="reg-email">Email Address</label>
          <input class="form-control" id="reg-email" type="email"
                 placeholder="you@example.com" required autocomplete="email" />
        </div>
        <div class="form-group">
          <label class="form-label" for="reg-password">Password</label>
          <div class="pw-wrapper">
            <input class="form-control" id="reg-password" type="password"
                   placeholder="Min. 6 characters" required minlength="6" />
            <button type="button" class="pw-eye" onclick="togglePw('reg-password', this)" title="Show/hide password">👁️</button>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="reg-role">I am a …</label>
          <select class="form-control" id="reg-role" required>
            <option value="">Select your role</option>
            <option value="customer">Customer — order food</option>
            <option value="restaurant">Restaurant Staff — manage orders</option>
            <option value="delivery">Delivery Agent — deliver orders</option>
            <option value="admin">Admin — system oversight</option>
            <option value="inventory">Inventory Manager — manage stock</option>
          </select>
        </div>
        <button class="btn btn-primary btn-full btn-lg" type="submit" id="reg-btn">
          Create Account
        </button>
      </form>

      <!-- ──── DEMO CREDENTIALS ──── -->
      <div class="demo-box" style="margin-top:1.5rem;">
        <h4>Demo Credentials (all use password: <code>password123</code>)</h4>
        <div class="demo-cred"><span class="role">Customer</span>      <span class="email">customer@demo.com</span></div>
        <div class="demo-cred"><span class="role">Restaurant</span>    <span class="email">restaurant@demo.com</span></div>
        <div class="demo-cred"><span class="role">Delivery</span>      <span class="email">delivery@demo.com</span></div>
        <div class="demo-cred"><span class="role">Admin</span>         <span class="email">admin@demo.com</span></div>
        <div class="demo-cred"><span class="role">Inventory</span>     <span class="email">inventory@demo.com</span></div>
      </div>

    </div><!-- /auth-card -->
  </div><!-- /auth-page -->

  <script src="js/api.js"></script>
  <script>
    // ── Redirect if already logged in ─────────────────────────────────────────
    window.addEventListener('load', async () => {
      const user = await getCurrentUser();
      if (user) redirectToDashboard(user.role);
    });

    // ── Password show/hide toggle ──────────────────────────────────────────────
    function togglePw(inputId, btn) {
      const input = document.getElementById(inputId);
      if (input.type === 'password') {
        input.type = 'text';
        btn.textContent = '🙈';
      } else {
        input.type = 'password';
        btn.textContent = '👁️';
      }
    }

    // ── Tab switching ─────────────────────────────────────────────────────────
    function showTab(tab) {
      document.getElementById('msg-area').innerHTML = '';
      document.getElementById('form-login').classList.toggle('hidden', tab !== 'login');
      document.getElementById('form-register').classList.toggle('hidden', tab !== 'register');
      document.getElementById('tab-login').classList.toggle('active', tab === 'login');
      document.getElementById('tab-register').classList.toggle('active', tab === 'register');
    }

    // ── Login handler ─────────────────────────────────────────────────────────
    async function handleLogin(event) {
      event.preventDefault();
      const btn   = document.getElementById('login-btn');
      const email = document.getElementById('login-email').value.trim();
      const pwd   = document.getElementById('login-password').value;

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Signing in…';
      document.getElementById('msg-area').innerHTML = '';

      try {
        const data = await apiFetch('/api/login', 'POST', { email, password: pwd });
        showMsg('success', `Welcome back, ${data.user.name}!`);
        // Small delay so the user sees the success message
        setTimeout(() => redirectToDashboard(data.user.role), 600);
      } catch (err) {
        showMsg('error', err.message);
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    }

    // ── Register handler ──────────────────────────────────────────────────────
    async function handleRegister(event) {
      event.preventDefault();
      const btn  = document.getElementById('reg-btn');
      const name = document.getElementById('reg-name').value.trim();
      const email= document.getElementById('reg-email').value.trim();
      const pwd  = document.getElementById('reg-password').value;
      const role = document.getElementById('reg-role').value;

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Creating account…';
      document.getElementById('msg-area').innerHTML = '';

      try {
        await apiFetch('/api/register', 'POST', { name, email, password: pwd, role });
        showMsg('success', 'Account created! Signing you in…');
        // Auto-login after registration
        const loginData = await apiFetch('/api/login', 'POST', { email, password: pwd });
        setTimeout(() => redirectToDashboard(loginData.user.role), 700);
      } catch (err) {
        showMsg('error', err.message);
        btn.disabled = false;
        btn.textContent = 'Create Account';
      }
    }

    // ── Inline message helper ─────────────────────────────────────────────────
    function showMsg(type, text) {
      document.getElementById('msg-area').innerHTML =
        `<div class="${type}-msg">${text}</div>`;
    }
  </script>
</body>
</html>
